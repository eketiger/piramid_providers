services:
  mysql:
    image: mysql:8.0
    container_name: piramid-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dev
      MYSQL_DATABASE: piramid
      MYSQL_USER: piramid
      MYSQL_PASSWORD: dev
    volumes:
      - piramid-mysql-data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppiramid"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: piramid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - piramid-redis-data:/data

volumes:
  piramid-mysql-data:
  piramid-redis-data:
