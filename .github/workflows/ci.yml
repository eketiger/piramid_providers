name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  install:
    name: Install + lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @piramid/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

  test:
    name: Unit + integration
    runs-on: ubuntu-latest
    needs: install
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: dev
          MYSQL_DATABASE: piramid
          MYSQL_USER: piramid
          MYSQL_PASSWORD: dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ppiramid"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
    env:
      # Integration tests target the test schema; setup script spins it up.
      TEST_DATABASE_URL: mysql://piramid:dev@127.0.0.1:3306/piramid_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @piramid/api exec prisma generate

      - name: Create test database
        run: |
          mysql -h 127.0.0.1 -uroot -pdev -e "CREATE DATABASE IF NOT EXISTS piramid_test; GRANT ALL ON piramid_test.* TO 'piramid'@'%'; FLUSH PRIVILEGES;"

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Upload coverage (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            apps/*/coverage
            packages/*/coverage
          if-no-files-found: ignore

  build:
    name: Build all packages
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @piramid/api exec prisma generate

      - name: Build
        run: pnpm build

  cdk-synth:
    name: CDK synth (dev)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: cdk synth
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: "000000000000"
          CDK_DEFAULT_REGION: us-east-1
        run: pnpm exec cdk synth --quiet

  e2e:
    name: Playwright E2E (web)
    runs-on: ubuntu-latest
    needs: build
    # Keep E2E advisory on PRs for now. Flip to required once the flow stabilizes.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @piramid/api exec prisma generate

      - name: Install Playwright browsers
        run: pnpm --filter @piramid/web exec playwright install --with-deps chromium

      - name: Run Playwright
        run: pnpm --filter @piramid/web test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
          if-no-files-found: ignore
